apiVersion: eksctl.io/v1alpha5 # eksctl config schema version
kind: ClusterConfig            # resource type: an EKS cluster configuration

metadata:
  name: jlebon-eks     # cluster name (must be unique per region/account)
  region: ca-central-1 # AWS region where the cluster will be created
  version: "1.36"      # Kubernetes version (latest EKS version as of June 2026)

managedNodeGroups:       # list of AWS-managed node groups (AWS handles ASG + rolling updates)
  - name: default        # node group name
    instanceType: t3.medium # EC2 instance type for worker nodes
    desiredCapacity: 2   # number of nodes to launch initially
    minSize: 1           # minimum nodes the ASG can scale down to
    maxSize: 3           # maximum nodes the ASG can scale up to
